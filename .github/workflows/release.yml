name: Build & Release

# Trigger: push a tag like  git tag v1.0.1 && git push origin v1.0.1
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # needed to create GitHub releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Write version.py from tag
        shell: python
        run: |
          import os, re
          tag = os.environ["GITHUB_REF_NAME"]          # e.g. "v1.0.1"
          ver = tag.lstrip("v")
          with open("version.py", "w") as f:
              f.write(f'__version__ = "{ver}"\n')

      - name: Build EXE
        run: python build.py

      - name: Create GitHub Release and upload EXE
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: BeamChat ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: dist/BeamChat.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
